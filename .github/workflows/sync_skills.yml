name: Sync Skills Database

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -e ".[dev]"

      - name: Test DB connection
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/skill-advisor.db')
          total = conn.execute('SELECT COUNT(*) FROM skills_merged').fetchone()[0]
          with_desc = conn.execute('SELECT COUNT(*) FROM skills_merged WHERE description != \"\"').fetchone()[0]
          print(f'Total: {total}, With description: {with_desc}')
          conn.close()
          "
