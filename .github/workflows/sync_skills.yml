name: Sync Skills Database

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/sync_skills.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check database
        run: |
          ls -la data/ 2>/dev/null || echo "no data dir"
          file data/skill-advisor.db 2>/dev/null || echo "no db file"

      - name: Record pre-sync stats
        id: pre-stats
        run: |
          python -c "
          import sqlite3, os
          db = 'data/skill-advisor.db'
          if os.path.exists(db) and os.path.getsize(db) > 1000:
              try:
                  conn = sqlite3.connect(db)
                  total = conn.execute('SELECT COUNT(*) FROM skills_merged').fetchone()[0]
                  with_desc = conn.execute('SELECT COUNT(*) FROM skills_merged WHERE description != \"\"').fetchone()[0]
                  conn.close()
                  print(f'pre_total={total}')
                  print(f'pre_with_desc={with_desc}')
              except Exception as e:
                  print(f'DB error: {e}')
                  print('pre_total=0')
                  print('pre_with_desc=0')
          else:
              print('DB not found or too small')
              print('pre_total=0')
              print('pre_with_desc=0')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'pre_total={total if \"total\" in dir() else 0}\n')
              f.write(f'pre_with_desc={with_desc if \"with_desc\" in dir() else 0}\n')
          "

      - name: Incremental update
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 增量更新数据源..."
          timeout 120 python scripts/incremental_update.py --github-token "$GITHUB_TOKEN" || echo "更新超时，跳过"

      - name: Backfill descriptions
        run: |
          echo "📊 回补技能描述..."
          timeout 120 python scripts/backfill_descriptions.py --workers 8 || echo "回补超时，跳过"

      - name: Rebuild vectors
        run: |
          echo "🔧 重建向量索引..."
          pip install -e ".[vector]" 2>/dev/null || true
          timeout 180 python scripts/build_vectors.py --incremental 2>/dev/null || python scripts/build_vectors.py --force || echo "向量重建超时，跳过"

      - name: Record post-sync stats
        id: post-stats
        run: |
          python -c "
          import sqlite3, os
          db = 'data/skill-advisor.db'
          conn = sqlite3.connect(db)
          total = conn.execute('SELECT COUNT(*) FROM skills_merged').fetchone()[0]
          with_desc = conn.execute('SELECT COUNT(*) FROM skills_merged WHERE description != \"\"').fetchone()[0]
          conn.close()
          print(f'post_total={total}')
          print(f'post_with_desc={with_desc}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'post_total={total}\n')
              f.write(f'post_with_desc={with_desc}\n')
          "

      - name: Check for changes
        id: git-check
        run: |
          git add data/skill-advisor.db CHANGELOG.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 数据库无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到数据库变化"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PRE_TOTAL="${{ steps.pre-stats.outputs.pre_total }}"
          POST_TOTAL="${{ steps.post-stats.outputs.post_total }}"
          DIFF=$((POST_TOTAL - PRE_TOTAL))
          if [ $DIFF -ge 0 ]; then
            SIGN="+"
          else
            SIGN=""
          fi
          git commit -m "chore: sync skills database [skip ci]"
          git push
          echo "✅ 已提交并推送更新"
