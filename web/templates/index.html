<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skill-advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .search-box { width: 100%; max-width: 600px; }
        input { width: 100%; padding: 16px 24px; font-size: 1.1em; border: 2px solid #333; border-radius: 12px; background: #1a1a1a; color: #e0e0e0; }
        .stats { margin-top: 30px; display: flex; gap: 30px; }
        .stat-value { font-size: 2em; color: #667eea; font-weight: bold; }
        .stat-label { color: #888; }
    </style>
</head>
<body>
    <h1>skill-advisor</h1>
    <p class="subtitle">Find the perfect AI skill</p>
    <div class="search-box">
        <form action="/search">
            <input type="text" name="q" placeholder="Search... (react, testing)">
        </form>
    </div>
    <div class="stats">
        <div><div class="stat-value">16,874</div><div class="stat-label">Skills</div></div>
        <div><div class="stat-value">6</div><div class="stat-label">Sources</div></div>
        <div><div class="stat-value">&lt;10ms</div><div class="stat-label">Search</div></div>
    </div>
</body>
</html>
